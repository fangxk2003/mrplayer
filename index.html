<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MR Excitation Demo</title>
    <script>
      window.__mrDemoErrors = [];
      window.addEventListener('error', function (event) {
        window.__mrDemoErrors.push(event.message || 'Unknown error');
      });
      window.addEventListener('unhandledrejection', function (event) {
        window.__mrDemoErrors.push(String(event.reason || 'Unhandled promise rejection'));
      });
    </script>
  </head>
  <body>
    <div id="app">
      <aside class="sidebar" aria-label="Simulation controls">
        <header class="brand">
          <p class="eyebrow">MR excitation</p>
          <h1>3D Shepp-Logan Phantom</h1>
        </header>

        <section class="control-section" aria-labelledby="playback-title">
          <div class="section-heading">
            <h2 id="playback-title">Playback</h2>
            <div class="toolbar">
              <button id="playPause" class="icon-button" type="button" title="Pause" aria-label="Pause">&#10073;&#10073;</button>
              <button id="resetTime" class="icon-button" type="button" title="Reset time" aria-label="Reset time">&#8635;</button>
              <button id="resetCamera" class="icon-button" type="button" title="Reset camera" aria-label="Reset camera">&#9711;</button>
            </div>
          </div>
          <label class="control">
            <span>Animation speed <output id="speedValue">1e-9x</output></span>
            <input id="speed" type="range" min="-9" max="0.5" step="0.01" value="-9" />
          </label>
        </section>

        <section class="control-section" aria-labelledby="sequence-title">
          <div class="section-heading">
            <h2 id="sequence-title">Sequence</h2>
          </div>
          <label class="control">
            <span>Sequence type</span>
            <select id="sequenceType">
              <option value="single-pulse" selected>Single RF pulse</option>
              <option value="spin-echo">Spin Echo</option>
            </select>
          </label>
          <label class="control">
            <span>Reference frame</span>
            <select id="referenceFrame">
              <option value="laboratory" selected>Laboratory view</option>
              <option value="rotating">Rotating view</option>
            </select>
          </label>
          <label class="control">
            <span>Flip angle <output id="flipValue">90 deg</output></span>
            <input id="flipAngle" type="range" min="0" max="120" step="1" value="90" />
          </label>
          <label class="control spin-echo-only" hidden>
            <span>Refocusing angle <output id="refocusValue">180 deg</output></span>
            <input id="refocusAngle" type="range" min="120" max="210" step="1" value="180" />
          </label>
          <label class="control spin-echo-only" hidden>
            <span>Echo time <output id="teValue">160 ms</output></span>
            <input id="echoTime" type="range" min="0.08" max="0.5" step="0.01" value="0.16" />
          </label>
          <label class="control">
            <span>B0 field <output id="b0Value">1.50 T</output></span>
            <input id="b0Rate" type="range" min="0.05" max="7" step="0.05" value="1.5" />
            <div class="control-readout">
              <span>Proton Larmor</span>
              <strong id="larmorValue">63.87 MHz</strong>
              <span>Period</span>
              <strong id="larmorPeriodValue">15.66 ns</strong>
            </div>
          </label>
          <label class="control">
            <span>Off-resonance spread <output id="offValue">0.45 Hz</output></span>
            <input id="offRes" type="range" min="0" max="1.2" step="0.05" value="0.45" />
          </label>
        </section>

        <section class="control-section" aria-labelledby="tissue-title">
          <div class="section-heading">
            <h2 id="tissue-title">Tissue</h2>
          </div>
          <label class="control">
            <span>Tissue preset</span>
            <select id="tissuePreset">
              <option value="grayMatter" selected>Gray matter</option>
              <option value="whiteMatter">White matter</option>
              <option value="csf">CSF / fluid</option>
              <option value="fat">Fat</option>
              <option value="muscle">Muscle</option>
              <option value="custom">Custom</option>
            </select>
          </label>
          <label class="control">
            <span>T1 recovery <output id="t1Value">1300 ms</output></span>
            <input id="t1" type="range" min="200" max="5000" step="50" value="1300" />
          </label>
          <label class="control">
            <span>T2 decay <output id="t2Value">100 ms</output></span>
            <input id="t2" type="range" min="40" max="2200" step="10" value="100" />
          </label>
        </section>

        <section class="control-section" aria-labelledby="view-title">
          <div class="section-heading">
            <h2 id="view-title">View</h2>
          </div>
          <label class="control">
            <span>Phantom model</span>
            <select id="phantomType">
              <option value="shepp-logan" selected>Shepp-Logan phantom</option>
              <option value="ellipsoid">Homogeneous ellipsoid</option>
            </select>
          </label>
          <label class="control">
            <span>Vector style</span>
            <select id="vectorStyle">
              <option value="classic" selected>Classic arrows</option>
              <option value="needle">Slim needles</option>
              <option value="cone">Cone glyphs</option>
              <option value="phase">Phase disks</option>
            </select>
          </label>
          <label class="control">
            <span>Vector density <output id="densityValue">12</output></span>
            <input id="density" type="range" min="7" max="16" step="1" value="12" />
          </label>
          <label class="check-row">
            <input id="showPhantom" type="checkbox" checked />
            <span>Phantom samples</span>
          </label>
          <label class="check-row">
            <input id="showVectors" type="checkbox" checked />
            <span>Moment vectors</span>
          </label>
          <label class="check-row">
            <input id="showNet" type="checkbox" checked />
            <span>Net magnetization</span>
          </label>
          <label class="check-row">
            <input id="showField" type="checkbox" checked />
            <span>B0 field</span>
          </label>
          <label class="check-row">
            <input id="showCoil" type="checkbox" checked />
            <span>RF / receive coil</span>
          </label>
        </section>
      </aside>

      <main class="stage" aria-label="3D MR excitation visualization">
        <div id="scene"></div>
        <div class="readout" aria-live="polite">
          <div>
            <span class="readout-label">Time</span>
            <strong id="timeReadout">0.00 s</strong>
          </div>
          <div>
            <span class="readout-label">Mxy</span>
            <strong id="mxyReadout">0.00</strong>
          </div>
          <div>
            <span class="readout-label">Mz</span>
            <strong id="mzReadout">1.00</strong>
          </div>
          <div>
            <span class="readout-label">Samples</span>
            <strong id="sampleReadout">0</strong>
          </div>
        </div>
      </main>

      <section class="timeline" aria-label="Sequence timing and magnetization signals">
        <div class="timeline-topline">
          <div class="timeline-labels">
            <span id="phaseLabelA">RF pulse</span>
            <span id="phaseLabelB">Free precession under B0</span>
            <span id="phaseLabelC">Cycle reset</span>
          </div>
          <strong id="sequenceReadout">Single RF pulse</strong>
        </div>
        <div id="eventTrack" class="track" aria-label="Zoomed sequence timeline">
          <div id="timeCursor" class="cursor"></div>
        </div>
        <div class="loop-editor" aria-label="Loop range">
          <div id="loopStrip" class="loop-strip">
            <div id="loopSelection" class="loop-selection">
              <button id="loopStartHandle" class="loop-handle start" type="button" title="Loop start" aria-label="Loop start"></button>
              <button id="loopEndHandle" class="loop-handle end" type="button" title="Loop end" aria-label="Loop end"></button>
            </div>
          </div>
          <div class="loop-readouts">
            <span>Start <strong id="loopStartReadout">0 ms</strong></span>
            <span>End <strong id="loopEndReadout">80 ms</strong></span>
            <span>Zoom <strong id="zoomReadout">37.5x</strong></span>
          </div>
        </div>
        <div class="chart-panel">
          <div class="chart-title">
            <span>Mz over time</span>
            <strong id="chartMzReadout">1.00</strong>
          </div>
          <canvas id="mzChart" class="signal-chart" width="900" height="90" aria-label="Mz over time chart"></canvas>
        </div>
        <div class="chart-panel">
          <div class="chart-title">
            <span>Mxy over time</span>
            <strong id="chartMxyReadout">0.00</strong>
          </div>
          <canvas id="mxyChart" class="signal-chart" width="900" height="90" aria-label="Mxy over time chart"></canvas>
        </div>
      </section>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
